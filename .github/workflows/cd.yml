name: CD

on:
  workflow_run:
    workflows: [ "CI" ]
    types: [ completed ]
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' &&  github.event.workflow_run.head_branch == 'main'}}

    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/tp-devops
      IMAGE_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Build imagen docker
        run: |
          docker build \
            -t $IMAGE_NAME:$IMAGE_SHA \
            -t $IMAGE_NAME:latest \
            .

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push image
        run: |
          docker push $IMAGE_NAME:$IMAGE_SHA
          docker push $IMAGE_NAME:latest

      - name: Trigger Render con imagen en especifico
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}&imgURL=docker.io/${IMAGE_NAME}:${IMAGE_SHA}"

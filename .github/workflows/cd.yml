name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    env:
      DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/tp-devops
      GHCR_IMAGE: ghcr.io/francisco3001/tp-devops
      IMAGE_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Build Docker image
        run: |
          docker build \
            -t $DOCKER_IMAGE:$IMAGE_SHA \
            -t $DOCKER_IMAGE:latest \
            -t $GHCR_IMAGE:$IMAGE_SHA \
            -t $GHCR_IMAGE:latest \
            .

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Login GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push Docker Hub
        run: |
          docker push $DOCKER_IMAGE:$IMAGE_SHA
          docker push $DOCKER_IMAGE:latest

      - name: Push GitHub Container Registry
        run: |
          docker push $GHCR_IMAGE:$IMAGE_SHA
          docker push $GHCR_IMAGE:latest

      - name: Trigger Render con imagen específica
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}&imgURL=docker.io/$DOCKER_IMAGE:$IMAGE_SHA"

name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/tp-devops
      IMAGE_SHA: ${{ github.sha }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_NAME:$IMAGE_SHA \
            -t $IMAGE_NAME:latest \
            .

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push image
        run: |
          docker push $IMAGE_NAME:$IMAGE_SHA
          docker push $IMAGE_NAME:latest

      - name: Trigger Render deploy with specific image version
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}&imgURL=docker.io/${IMAGE_NAME}:${IMAGE_SHA}"
